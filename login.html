

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - نظام متابعة البريد</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo">
                <div class="logo-icon">📧</div>
                <h1>نظام متابعة البريد</h1>
                <p>تسجيل الدخول</p>
            </div>
           
            <div id="errorMessage" class="error-message"></div>
            <div id="loadingMessage" class="loading-message" style="display:none;">⏳ جاري تسجيل الدخول...</div>
           
            <form id="loginForm">
                <div class="form-group">
                    <label>👤 اسم المستخدم</label>
                    <input type="text" id="username" placeholder="أدخل اسم المستخدم" required autocomplete="off">
                </div>
               
                <div class="form-group">
                    <label>🔒 كلمة المرور</label>
                    <input type="password" id="password" placeholder="أدخل كلمة المرور" required>
                </div>
               
                <button type="submit" class="btn-login" id="loginBtn">تسجيل الدخول</button>
            </form>
           
            <div class="footer">
                © 2026 نظام متابعة البريد الوارد
            </div>
        </div>
    </div>
   
    <script src="js/app.js"></script>
    <script>
        // ============================================
        // التحقق من تسجيل الدخول المسبق
        // ============================================
        if (isLoggedIn()) {
            const user = getCurrentUser();
            redirectBasedOnRole(user);
        }
       
        // ============================================
        // دالة التوجيه حسب الدور
        // ============================================
        function redirectBasedOnRole(user) {
            if (user.role === 'admin') {
                window.location.href = 'index.html';
            } else if (user.role === 'deputy') {
                window.location.href = 'deputy.html';
            } else {
                window.location.href = 'employee.html';
            }
        }
       
        // ============================================
        // معالجة نموذج تسجيل الدخول
        // ============================================
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
           
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMessage');
            const loadingDiv = document.getElementById('loadingMessage');
            const loginBtn = document.getElementById('loginBtn');
           
            // التحقق من إدخال البيانات
            if (!username || !password) {
                errorDiv.textContent = 'يرجى إدخال اسم المستخدم وكلمة المرور';
                errorDiv.classList.add('show');
                return;
            }
           
            // إخفاء رسائل الخطأ السابقة وإظهار التحميل
            errorDiv.classList.remove('show');
            loadingDiv.style.display = 'block';
            loginBtn.disabled = true;
            loginBtn.textContent = '⏳ جاري تسجيل الدخول...';
           
            try {
                // استدعاء دالة تسجيل الدخول من app.js
                const result = await login(username, password);
               
                if (result.success) {
                    // تسجيل دخول ناجح - توجيه المستخدم
                    loadingDiv.style.display = 'none';
                    redirectBasedOnRole(result.user);
                } else {
                    // فشل تسجيل الدخول
                    loadingDiv.style.display = 'none';
                    errorDiv.textContent = result.message || '❌ فشل تسجيل الدخول. تحقق من اسم المستخدم وكلمة المرور.';
                    errorDiv.classList.add('show');
                    loginBtn.disabled = false;
                    loginBtn.textContent = 'تسجيل الدخول';
                }
            } catch (error) {
                // خطأ في الاتصال
                loadingDiv.style.display = 'none';
                console.error('Login error:', error);
                errorDiv.textContent = '❌ فشل الاتصال بالخادم. حاول مرة أخرى.';
                errorDiv.classList.add('show');
                loginBtn.disabled = false;
                loginBtn.textContent = 'تسجيل الدخول';
            }
        });
       
        // ============================================
        // إضافة إمكانية الضغط على Enter للتسجيل
        // ============================================
        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('loginForm').dispatchEvent(new Event('submit'));
            }
        });
       
        document.getElementById('username').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('loginForm').dispatchEvent(new Event('submit'));
            }
        });
       
        // ============================================
        // عرض رسالة ترحيبية في الكونسول
        // ============================================
        console.log('🚀 نظام متابعة البريد الوارد - صفحة تسجيل الدخول');
        console.log('📧 الإصدار 3.0.0');
    </script>
</body>
</html>
