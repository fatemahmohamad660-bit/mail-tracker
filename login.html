

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - نظام متابعة البريد</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo">
                <div class="logo-icon">📧</div>
                <h1>نظام متابعة البريد</h1>
                <p>تسجيل الدخول</p>
            </div>
           
            <div id="errorMessage" class="error-message"></div>
            <div id="loadingMessage" class="loading-message" style="display:none;">جاري تسجيل الدخول...</div>
           
            <form id="loginForm">
                <div class="form-group">
                    <label>👤 اسم المستخدم</label>
                    <input type="text" id="username" placeholder="أدخل اسم المستخدم" required autocomplete="off">
                </div>
               
                <div class="form-group">
                    <label>🔒 كلمة المرور</label>
                    <input type="password" id="password" placeholder="أدخل كلمة المرور" required>
                </div>
               
                <button type="submit" class="btn-login" id="loginBtn">تسجيل الدخول</button>
            </form>
           
            <div class="footer">
                © 2026 نظام متابعة البريد الوارد
            </div>
        </div>
    </div>
   
    <script src="js/app.js"></script>
    <script>
        // التحقق من تسجيل الدخول المسبق
        if (isLoggedIn()) {
            const user = getCurrentUser();
            redirectBasedOnRole(user);
        }
       
        function redirectBasedOnRole(user) {
            if (user.role === 'admin') {
                window.location.href = 'index.html';
            } else if (user.role === 'deputy') {
                window.location.href = 'deputy.html';
            } else {
                window.location.href = 'employee.html';
            }
        }
       
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
           
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMessage');
            const loadingDiv = document.getElementById('loadingMessage');
            const loginBtn = document.getElementById('loginBtn');
           
            if (!username || !password) {
                errorDiv.textContent = 'يرجى إدخال اسم المستخدم وكلمة المرور';
                errorDiv.classList.add('show');
                return;
            }
           
            errorDiv.classList.remove('show');
            loadingDiv.style.display = 'block';
            loginBtn.disabled = true;
           
            try {
                const result = await login(username, password);
               
                if (result.success) {
                    redirectBasedOnRole(result.user);
                } else {
                    errorDiv.textContent = result.message || 'فشل تسجيل الدخول';
                    errorDiv.classList.add('show');
                }
            } catch (error) {
                errorDiv.textContent = 'حدث خطأ في الاتصال. حاول مرة أخرى.';
                errorDiv.classList.add('show');
            } finally {
                loadingDiv.style.display = 'none';
                loginBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
