

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - نظام متابعة البريد</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo">
                <div class="logo-icon">📧</div>
                <h1>نظام متابعة البريد</h1>
                <p>تسجيل الدخول</p>
            </div>
           
            <div id="errorMessage" class="error-message"></div>
           
            <form id="loginForm">
                <div class="form-group">
                    <label>👤 اسم المستخدم</label>
                    <input type="text" id="username" placeholder="أدخل اسم المستخدم" required>
                </div>
               
                <div class="form-group">
                    <label>🔒 كلمة المرور</label>
                    <input type="password" id="password" placeholder="أدخل كلمة المرور" required>
                </div>
               
                <button type="submit" class="btn-login">تسجيل الدخول</button>
            </form>
           
            <div class="footer">
                © 2026 نظام متابعة البريد الوارد
            </div>
        </div>
    </div>
   
    <script src="js/app.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
           
            // مؤقتاً - سيتم تعديله لاحقاً للتواصل مع Google Sheets
            console.log('محاولة تسجيل الدخول:', username);
            alert('سيتم ربط التطبيق بقاعدة البيانات في المرحلة القادمة');
        });
    </script>
</body>
</html>
